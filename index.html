<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Jukebox</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    font-family: Arial;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CUORE */
.heart {
    width: 180px;
    height: 160px;
    position: relative;
    margin-top: 40px;
    transform: rotate(-45deg);
    background: red;
    box-shadow: 0 0 25px red;
}

.heart:before,
.heart:after {
    content: "";
    width: 180px;
    height: 160px;
    background: red;
    border-radius: 50%;
    position: absolute;
}

.heart:before { top: -90px; left: 0; }
.heart:after { left: 90px; top: 0; }

.player {
    margin-top: 60px;
    text-align: center;
    width: 90%;
}

button {
    background: red;
    border: none;
    padding: 15px;
    margin: 10px;
    border-radius: 50px;
    color: white;
    font-size: 18px;
}

.controls {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>❤️ VIDEO JUKEBOX</h2>

<div class="heart"></div>

<div class="player">
    <h3 id="title">Caricamento...</h3>
    <audio id="audio" controls autoplay></audio>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<script>
let playlist = [];
let index = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");

fetch("playlist1.json")
.then(r => r.json())
.then(data => {
    playlist = data;
    loadSong(0);
});

function loadSong(i){
    if(!playlist.length) return;
    index = i;

    audio.src = playlist[i].stream;
    title.innerText = playlist[i].title;

    audio.play();
}

function next(){
    index++;
    if(index >= playlist.length) index = 0;
    loadSong(index);
}

function prev(){
    index--;
    if(index < 0) index = playlist.length - 1;
    loadSong(index);
}

function play(){
    audio.play();
}

function pause(){
    audio.pause();
}
</script>

</body>
</html>
