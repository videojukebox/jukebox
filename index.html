<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jukebox Player</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h2 {
    margin: 15px 0;
    color: #ff2d55;
}

/* PLAYER */
.player {
    margin-top: 10px;
}

#title {
    margin: 10px;
    font-size: 18px;
}

/* CONTROLLI */
button {
    background: #ff2d55;
    border: none;
    padding: 12px 18px;
    margin: 5px;
    border-radius: 30px;
    color: white;
    font-size: 16px;
}

/* LISTA */
#list {
    width: 92%;
    margin: 20px auto;
    text-align: left;
}

.item {
    padding: 12px;
    margin: 8px 0;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    cursor: pointer;
}

.item.active {
    background: rgba(255,45,85,0.3);
    border-left: 3px solid #ff2d55;
}
</style>
</head>

<body>

<h2>❤️ JUKEBOX PLAYER</h2>

<div class="player">
    <div id="title">Caricamento playlist...</div>

    <audio id="audio" controls></audio>

    <div>
        <button onclick="prev()">⏮</button>
        <button onclick="playAudio()">▶</button>
        <button onclick="pauseAudio()">⏸</button>
        <button onclick="next()">⏭</button>
    </div>
</div>

<div id="list"></div>

<script>

let playlist = [];
let index = 0;
let userInteracted = false;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const list = document.getElementById("list");

/* Sblocca audio solo dopo interazione utente */
document.addEventListener("click", () => {
    userInteracted = true;
}, { once: true });

/* CARICA JSON */
fetch("playlist1.json")
.then(r => r.json())
.then(data => {
    playlist = data;
    renderList();
    loadSong(0);
});

/* CARICA BRANO */
function loadSong(i) {

    if(!playlist.length) return;

    index = i;

    audio.src = playlist[i].stream;
    title.innerText = playlist[i].title;

    if(userInteracted){
        audio.play().catch(()=>{});
    }

    renderList();
}

/* NEXT */
function next() {
    index++;
    if(index >= playlist.length) index = 0;
    loadSong(index);
}

/* PREV */
function prev() {
    index--;
    if(index < 0) index = playlist.length - 1;
    loadSong(index);
}

/* PLAY */
function playAudio() {
    userInteracted = true;
    audio.play();
}

/* PAUSE */
function pauseAudio() {
    audio.pause();
}

/* LISTA BRANI */
function renderList() {

    list.innerHTML = "";

    for(let i=0;i<playlist.length;i++){

        let div = document.createElement("div");
        div.className = "item" + (i === index ? " active" : "");
        div.innerText = "🎵 " + playlist[i].title;

        div.onclick = () => loadSong(i);

        list.appendChild(div);
    }
}

</script>

</body>
</html>
